<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca Aurora</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container">

<div class="left">
<div class="overlay">

<div class="logo">
<i class="fa-solid fa-book-open"></i>
</div>

<h1>Biblioteca Aurora</h1>

<p>
Bem-vindo à Biblioteca Aurora.
Aqui você pode acessar sua conta
ou criar uma nova para explorar
nosso catálogo de livros.
</p>

</div>
</div>

<div class="right">

<div class="login active">

<h2>Login</h2>
<p class="subtitle">Entre na sua conta</p>

<form>

<label>E-mail</label>
<div class="input-box">
<i class="fa-solid fa-envelope"></i>
<input type="email" placeholder="Digite seu e-mail">
</div>

<label>Senha</label>
<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input type="password" id="loginPassword" placeholder="Digite sua senha">
<button class="eye" type="button" onclick="togglePassword('loginPassword',this)">
<i class="fa-solid fa-eye"></i>
</button>
</div>

<div class="options">

<label class="remember">
<input type="checkbox">
Lembrar-me
</label>

<a href="#">Esqueci minha senha</a>

</div>

<button class="btn">Entrar</button>

</form>

<p class="switch">
Não possui uma conta?
<a href="#" onclick="showRegister()">Cadastre-se</a>
</p>

</div>

<div class="register">

<h2>Cadastro</h2>
<p class="subtitle">Crie sua conta</p>

<form>

<label>Nome</label>
<div class="input-box">
<i class="fa-solid fa-user"></i>
<input type="text" placeholder="Digite seu nome">
</div>

<label>E-mail</label>
<div class="input-box">
<i class="fa-solid fa-envelope"></i>
<input type="email" placeholder="Digite seu e-mail">
</div>

<label>Senha</label>
<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input type="password" id="registerPassword" placeholder="Digite sua senha">
<button class="eye" type="button" onclick="togglePassword('registerPassword',this)">
<i class="fa-solid fa-eye"></i>
</button>
</div>

<label>Confirmar senha</label>
<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input type="password" id="confirmPassword" placeholder="Confirme sua senha">
<button class="eye" type="button" onclick="togglePassword('confirmPassword',this)">
<i class="fa-solid fa-eye"></i>
</button>
</div>

<button class="btn">Cadastrar</button>

</form>

<p class="switch">
Já possui uma conta?
<a href="#" onclick="showLogin()">Entrar</a>
</p>

</div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
